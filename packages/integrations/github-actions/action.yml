name: 'OCC Proof Verification'
description: 'Verify OCC proof chains in CI. Checks Ed25519 signatures, chain integrity, and counter monotonicity. Fails if chain is broken or unauthorized actions detected.'
author: 'Mike Argento'

branding:
  icon: 'shield'
  color: 'orange'

inputs:
  proof-file:
    description: 'Path to proof.jsonl file'
    required: false
    default: 'proof.jsonl'
  fail-on-denied:
    description: 'Fail the workflow if any denied actions are found'
    required: false
    default: 'true'
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'

outputs:
  total-proofs:
    description: 'Total number of proof entries'
  allowed-count:
    description: 'Number of allowed actions'
  denied-count:
    description: 'Number of denied actions'
  chain-intact:
    description: 'Whether the proof chain is intact (true/false)'
  verification-passed:
    description: 'Whether full verification passed (true/false)'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install verification dependencies
      shell: bash
      run: |
        cd ${{ github.action_path }}
        npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

    - name: Verify proof chain
      shell: bash
      id: verify
      env:
        INPUT_PROOF_FILE: ${{ inputs.proof-file }}
        INPUT_FAIL_ON_DENIED: ${{ inputs.fail-on-denied }}
      run: |
        node ${{ github.action_path }}/dist/index.js "${{ inputs.proof-file }}"
