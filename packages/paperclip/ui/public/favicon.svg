<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background with slight rounding -->
  <rect width="32" height="32" rx="6" fill="#111111"/>
  <!-- Three vertical bars — abstract "OCC" monogram -->
  <!-- The left bar is rounded on both ends (the O) -->
  <rect x="6" y="7" width="5" height="18" rx="2.5" fill="#34d399"/>
  <!-- Middle bar -->
  <rect x="13.5" y="7" width="5" height="18" rx="1" fill="#34d399"/>
  <!-- Right bar -->
  <rect x="21" y="7" width="5" height="18" rx="1" fill="#34d399"/>
</svg>
