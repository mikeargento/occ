<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCC — Policy Enforcement Demo</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0a0f;--card:#111118;--border:#1a1a2e;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--text:#e0e0e0;--muted:#6b7280;--glow-green:rgba(34,197,94,.15);--glow-red:rgba(239,68,68,.15)}
  body{font-family:'JetBrains Mono','SF Mono',monospace;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{text-align:center;padding:24px 16px 16px;border-bottom:1px solid var(--border)}
  header h1{font-size:14px;letter-spacing:6px;text-transform:uppercase;color:var(--muted);font-weight:400}
  header p{font-size:20px;margin-top:6px;color:var(--text);font-weight:600}
  .main{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden;gap:1px;background:var(--border)}
  .panel{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
  .panel-head{padding:14px 20px;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
  .panel-head .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  .panel-body{flex:1;overflow-y:auto;padding:16px}
  .panel-body::-webkit-scrollbar{width:4px}
  .panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  /* Activity entries */
  .entry{border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:10px;opacity:0;transform:translateY(-12px);animation:slideIn .3s ease-out forwards;background:var(--card)}
  .entry.allowed{border-left:3px solid var(--green)}
  .entry.denied{border-left:3px solid var(--red);animation:slideIn .3s ease-out forwards,redPulse .6s ease-out}
  .entry-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .entry-tool{font-size:13px;font-weight:600}
  .entry-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:1px}
  .entry-badge.allowed{background:var(--glow-green);color:var(--green)}
  .entry-badge.denied{background:var(--glow-red);color:var(--red)}
  .entry-args{font-size:11px;color:var(--muted);margin-top:2px;word-break:break-all}
  .entry-time{font-size:10px;color:var(--muted)}

  /* Proof chain */
  .chain{position:relative;padding-left:24px}
  .chain::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:2px;background:var(--border)}
  .proof{position:relative;margin-bottom:16px;opacity:0;transform:translateY(-12px);animation:slideIn .3s ease-out forwards}
  .proof::before{content:'';position:absolute;left:-17px;top:14px;width:10px;height:10px;border-radius:50%;border:2px solid var(--border);background:var(--bg);z-index:1;transition:all .3s}
  .proof.allowed::before{border-color:var(--green);background:var(--green);box-shadow:0 0 8px var(--glow-green)}
  .proof.denied::before{border-color:var(--red);background:var(--red);box-shadow:0 0 8px var(--glow-red)}
  .proof-block{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
  .proof-num{font-size:10px;color:var(--orange);font-weight:700;letter-spacing:1px}
  .proof-tool{font-size:12px;margin-top:3px;font-weight:600}
  .proof-hash{font-size:10px;color:var(--muted);margin-top:4px;font-family:inherit}
  .proof-verdict{font-size:10px;margin-top:4px;font-weight:600}
  .proof-verdict.allowed{color:var(--green)}
  .proof-verdict.denied{color:var(--red)}

  /* Conclusion overlay */
  .conclusion{position:fixed;inset:0;background:rgba(10,10,15,.92);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .5s}
  .conclusion.visible{opacity:1;pointer-events:auto}
  .conclusion-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 48px;max-width:560px;text-align:center;transform:translateY(20px);transition:transform .5s}
  .conclusion.visible .conclusion-box{transform:translateY(0)}
  .conclusion h2{font-size:18px;margin-bottom:12px;color:var(--text)}
  .conclusion .stat{display:flex;gap:24px;justify-content:center;margin:20px 0}
  .conclusion .stat-item{text-align:center}
  .conclusion .stat-num{font-size:28px;font-weight:700}
  .conclusion .stat-num.green{color:var(--green)}
  .conclusion .stat-num.red{color:var(--red)}
  .conclusion .stat-label{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
  .conclusion p{color:var(--muted);font-size:12px;line-height:1.6;margin-top:16px}
  .conclusion .verify{display:inline-flex;align-items:center;gap:6px;margin-top:20px;padding:8px 20px;border-radius:8px;background:var(--glow-green);color:var(--green);font-size:12px;font-weight:600;border:1px solid rgba(34,197,94,.3)}
  .conclusion .verify svg{width:16px;height:16px}
  .conclusion .verify svg path{stroke-dasharray:20;stroke-dashoffset:20;animation:drawCheck .4s .3s ease-out forwards}

  /* Bottom bar */
  .bottom{padding:12px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-shrink:0}
  .btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 20px;border-radius:6px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s}
  .btn:hover{border-color:var(--orange);color:var(--orange)}
  .btn:disabled{opacity:.4;cursor:default;border-color:var(--border);color:var(--muted)}
  .chain-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .chain-status .dot{width:6px;height:6px;border-radius:50%;background:var(--muted)}
  .chain-status.intact .dot{background:var(--green)}
  .chain-status.intact{color:var(--green)}

  @keyframes slideIn{to{opacity:1;transform:translateY(0)}}
  @keyframes redPulse{0%{background:var(--glow-red)}100%{background:var(--card)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes drawCheck{to{stroke-dashoffset:0}}
</style>
</head>
<body>
<header>
  <h1>OCC &mdash; Origin Controlled Computing</h1>
  <p>Prove what your AI agent can&rsquo;t do</p>
</header>
<div class="main">
  <div class="panel">
    <div class="panel-head"><span class="dot"></span>Agent Activity</div>
    <div class="panel-body" id="activity"></div>
  </div>
  <div class="panel">
    <div class="panel-head"><span class="dot"></span>Proof Chain</div>
    <div class="panel-body" id="proofs"><div class="chain" id="chain"></div></div>
  </div>
</div>
<div class="bottom">
  <button class="btn" id="runBtn" onclick="runDemo()">Run Demo</button>
  <div class="chain-status" id="chainStatus"><span class="dot"></span><span id="statusText">Waiting...</span></div>
</div>
<div class="conclusion" id="conclusion">
  <div class="conclusion-box">
    <h2>Policy Enforcement Verified</h2>
    <div class="stat">
      <div class="stat-item"><div class="stat-num green" id="cAllowed">0</div><div class="stat-label">Allowed</div></div>
      <div class="stat-item"><div class="stat-num red" id="cDenied">0</div><div class="stat-label">Denied</div></div>
      <div class="stat-item"><div class="stat-num" style="color:var(--orange)" id="cProofs">0</div><div class="stat-label">Proofs</div></div>
    </div>
    <p id="cMsg"></p>
    <div class="verify"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>Chain Intact &mdash; All Proofs Verified</div>
    <br><button class="btn" style="margin-top:16px" onclick="hideConclusion()">Close</button>
  </div>
</div>
<script>
const STEPS=[
  {tool:'read_file',args:'"/docs/readme.md"',allowed:true,msg:'Reading documentation file'},
  {tool:'list_directory',args:'"/docs"',allowed:true,msg:'Listing documentation directory'},
  {tool:'read_file',args:'"/src/secrets.env"',allowed:true,msg:'Reading source file (read allowed)'},
  {tool:'write_file',args:'"/src/index.ts", "malicious code"',allowed:false,msg:'Write blocked by policy'},
  {tool:'execute_command',args:'"rm -rf /"',allowed:false,msg:'Command execution blocked'},
  {tool:'read_file',args:'"/docs/api.md"',allowed:true,msg:'Reading API documentation'},
];
let running=false,proofCounter=0,sse=null;
function fakeHash(){return Array.from(crypto.getRandomValues(new Uint8Array(4))).map(b=>b.toString(16).padStart(2,'0')).join('')}
function ts(){return new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'})}

function addEntry(step,idx){
  const d=document.createElement('div');
  d.className='entry '+(step.allowed?'allowed':'denied');
  d.innerHTML=`<div class="entry-header"><span class="entry-tool">${step.allowed?'\u2705':'\ud83d\udeab'} ${step.tool}</span><span class="entry-badge ${step.allowed?'allowed':'denied'}">${step.allowed?'ALLOWED':'DENIED'}</span></div><div class="entry-args">${step.tool}(${step.args})</div><div style="display:flex;justify-content:space-between;margin-top:6px"><span class="entry-time">${ts()}</span><span class="entry-time">${step.msg}</span></div>`;
  const el=document.getElementById('activity');
  el.appendChild(d);
  el.scrollTop=el.scrollHeight;
}
function addProof(step,num){
  const hash=fakeHash();
  const d=document.createElement('div');
  d.className='proof '+(step.allowed?'allowed':'denied');
  d.innerHTML=`<div class="proof-block"><div class="proof-num">PROOF #${num}</div><div class="proof-tool">${step.tool}</div><div class="proof-hash">sha256:${hash}...${fakeHash()}</div><div class="proof-verdict ${step.allowed?'allowed':'denied'}">${step.allowed?'ALLOWED':'DENIED'}</div></div>`;
  const chain=document.getElementById('chain');
  chain.appendChild(d);
  document.getElementById('proofs').scrollTop=document.getElementById('proofs').scrollHeight;
}
function updateStatus(n,allowed,denied){
  const el=document.getElementById('chainStatus');
  const txt=document.getElementById('statusText');
  el.className='chain-status intact';
  txt.textContent=`Chain Intact \u2014 ${n} proofs, counters 1-${n}, no gaps`;
}
function showConclusion(allowed,denied,total){
  document.getElementById('cAllowed').textContent=allowed;
  document.getElementById('cDenied').textContent=denied;
  document.getElementById('cProofs').textContent=total;
  document.getElementById('cMsg').textContent=`This agent could NOT have written to any file or executed any command. ${denied} attempt${denied!==1?'s were':' was'} blocked and cryptographically proven.`;
  document.getElementById('conclusion').classList.add('visible');
}
function hideConclusion(){document.getElementById('conclusion').classList.remove('visible')}

function runDemo(){
  if(running)return;
  running=true;
  document.getElementById('runBtn').disabled=true;
  document.getElementById('activity').innerHTML='';
  document.getElementById('chain').innerHTML='';
  document.getElementById('chainStatus').className='chain-status';
  document.getElementById('statusText').textContent='Building chain...';
  hideConclusion();
  proofCounter=0;
  let allowed=0,denied=0;

  // Initial message
  const init=document.createElement('div');
  init.className='entry allowed';
  init.innerHTML=`<div class="entry-header"><span class="entry-tool">\u26a1 Agent Connected</span><span class="entry-badge allowed">READY</span></div><div class="entry-args">Policy loaded: read-only access to /docs and /src</div><div class="entry-time">${ts()}</div>`;
  document.getElementById('activity').appendChild(init);

  STEPS.forEach((step,i)=>{
    setTimeout(()=>{
      proofCounter++;
      if(step.allowed)allowed++;else denied++;
      addEntry(step,i);
      addProof(step,proofCounter);
      updateStatus(proofCounter,allowed,denied);
      if(i===STEPS.length-1){
        setTimeout(()=>{
          showConclusion(allowed,denied,proofCounter);
          running=false;
          document.getElementById('runBtn').disabled=false;
        },800);
      }
    },(i+1)*900);
  });
}

// Live mode: if served by proxy, listen for SSE events
(function(){
  if(location.protocol==='file:')return;
  try{
    const base=location.origin;
    sse=new EventSource(base+'/api/events');
    sse.onmessage=function(e){
      try{
        const ev=JSON.parse(e.data);
        if(ev.type==='tool-executed'){
          proofCounter++;
          const step={tool:ev.tool,args:JSON.stringify(ev.args||''),allowed:!ev.denied,msg:ev.denied?'Blocked by policy':'Executed'};
          addEntry(step,proofCounter);
          addProof(step,proofCounter);
          updateStatus(proofCounter,0,0);
        }
      }catch{}
    };
    sse.onerror=function(){sse.close();sse=null};
    document.querySelector('.panel-head .dot').style.background='var(--orange)';
  }catch{}
})();

// Auto-run after a brief pause
setTimeout(runDemo,600);
</script>
</body>
</html>
